<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gauss's Law — Electromagnetic Flux</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #020408;
    color: #00e5ff;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    height: 100vh;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
  }

  #ui {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #title {
    position: absolute;
    top: 24px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 6px;
    color: #00e5ff;
    text-shadow: 0 0 20px #00e5ff88;
    text-transform: uppercase;
    white-space: nowrap;
  }

  #panel {
    position: absolute;
    top: 70px; right: 24px;
    background: rgba(0,10,20,0.85);
    border: 1px solid #00e5ff33;
    border-left: 2px solid #00e5ff;
    padding: 18px 20px;
    width: 220px;
    pointer-events: all;
    backdrop-filter: blur(10px);
  }

  .panel-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: #00e5ff88;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .slider-row {
    margin-bottom: 16px;
  }

  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 2px;
    background: #00e5ff33;
    outline: none;
    margin-top: 4px;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #00e5ff;
    box-shadow: 0 0 8px #00e5ff;
    cursor: pointer;
  }

  .val-display {
    font-size: 11px;
    color: #00e5ff;
    text-align: right;
    margin-top: 2px;
  }

  #flux-display {
    position: absolute;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }

  .flux-label {
    font-size: 9px;
    letter-spacing: 4px;
    color: #00e5ff66;
    text-transform: uppercase;
  }

  .flux-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: #00e5ff;
    text-shadow: 0 0 30px #00e5ff, 0 0 60px #00e5ff44;
    letter-spacing: 2px;
  }

  .flux-unit {
    font-size: 10px;
    color: #00e5ff88;
    letter-spacing: 3px;
  }

  .gauss-law {
    position: absolute;
    bottom: 24px; right: 24px;
    font-size: 10px;
    color: #00e5ff55;
    text-align: right;
    line-height: 1.8;
  }

  .gauss-law span {
    color: #00e5ff99;
  }

  #info {
    position: absolute;
    bottom: 24px; left: 24px;
    font-size: 9px;
    color: #00e5ff44;
    line-height: 1.8;
    letter-spacing: 1px;
  }

  .btn {
    display: inline-block;
    padding: 6px 12px;
    border: 1px solid #00e5ff44;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: #00e5ff;
    cursor: pointer;
    background: transparent;
    pointer-events: all;
    margin-top: 8px;
    width: 100%;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn:hover {
    background: #00e5ff22;
    border-color: #00e5ff;
  }
  .btn.active {
    background: #00e5ff33;
    border-color: #00e5ff;
    box-shadow: 0 0 10px #00e5ff44;
  }

  #charge-type-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    text-align: center;
    padding: 4px;
    margin-top: 4px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div id="title">Gauss's Law — Electromagnetic Flux Simulation</div>

  <div id="panel">
    <div class="slider-row">
      <div class="panel-label">Charge Magnitude (Q)</div>
      <input type="range" id="charge-slider" min="1" max="10" step="0.1" value="5">
      <div class="val-display" id="charge-val">5.0 μC</div>
    </div>
    <div class="slider-row">
      <div class="panel-label">Gaussian Surface Radius</div>
      <input type="range" id="radius-slider" min="0.5" max="3" step="0.05" value="1.5">
      <div class="val-display" id="radius-val">1.50 m</div>
    </div>
    <div class="slider-row">
      <div class="panel-label">Field Line Density</div>
      <input type="range" id="density-slider" min="6" max="24" step="2" value="12">
      <div class="val-display" id="density-val">12</div>
    </div>
    <button class="btn active" id="toggle-surface">Gaussian Surface: ON</button>
    <button class="btn" id="toggle-charge">Switch to Negative</button>
    <div id="charge-type-label" style="color:#00e5ff;">⊕ Positive Charge</div>
  </div>

  <div id="flux-display">
    <div class="flux-label">Total Electric Flux Φ</div>
    <div class="flux-value" id="flux-val">565.0</div>
    <div class="flux-unit">kN·m² / C</div>
  </div>

  <div class="gauss-law">
    <span>∮ E · dA = Q_enc / ε₀</span><br>
    ε₀ = 8.854 × 10⁻¹² F/m
  </div>

  <div id="info">
    DRAG — Rotate<br>
    SCROLL — Zoom
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x020408, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 200);
camera.position.set(0, 2, 7);
camera.lookAt(0, 0, 0);

scene.fog = new THREE.FogExp2(0x020408, 0.04);

scene.add(new THREE.AmbientLight(0x001122, 2));
const dLight = new THREE.DirectionalLight(0x00e5ff, 0.5);
dLight.position.set(5, 10, 5);
scene.add(dLight);

const gridHelper = new THREE.GridHelper(20, 20, 0x003344, 0x001a22);
scene.add(gridHelper);

let chargeVal = 5.0;
let surfaceRadius = 1.5;
let fieldDensity = 12;
let isPositive = true;
let showSurface = true;

const fieldLinesGroup = new THREE.Group();
scene.add(fieldLinesGroup);

let gaussSphere = null;
let chargeObj = null;

const eps0 = 8.854e-12;

function calcFlux(Q, r) {
  return (Q * 1e-6) / eps0;
}

function updateFluxDisplay() {
  const Q = chargeVal * (isPositive ? 1 : -1);
  const phi = Math.abs(calcFlux(Q, surfaceRadius));
  const phiK = phi / 1000;
  document.getElementById('flux-val').textContent = phiK.toFixed(1);
  const color = isPositive ? '#00e5ff' : '#ff4466';
  document.getElementById('flux-val').style.color = color;
  document.getElementById('flux-val').style.textShadow = `0 0 30px ${color}, 0 0 60px ${color}44`;
}

function makeCharge() {
  if (chargeObj) scene.remove(chargeObj);
  const geo = new THREE.SphereGeometry(0.18, 32, 32);
  const color = isPositive ? 0x00e5ff : 0xff3355;
  const mat = new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity: 2, roughness: 0.1, metalness: 0.8
  });
  chargeObj = new THREE.Mesh(geo, mat);
  const haloGeo = new THREE.SphereGeometry(0.28, 16, 16);
  const haloMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.15, side: THREE.FrontSide });
  chargeObj.add(new THREE.Mesh(haloGeo, haloMat));
  scene.add(chargeObj);
}

function makeGaussianSurface() {
  if (gaussSphere) scene.remove(gaussSphere);
  if (!showSurface) return;
  const geo = new THREE.SphereGeometry(surfaceRadius, 40, 40);
  const mat = new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.06, side: THREE.DoubleSide });
  gaussSphere = new THREE.Mesh(geo, mat);
  const wf = new THREE.Mesh(
    new THREE.SphereGeometry(surfaceRadius, 20, 20),
    new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.25, wireframe: true })
  );
  gaussSphere.add(wf);
  scene.add(gaussSphere);
}

function makeSpiralArrow(dir, length, color) {
  const points = [];
  for (let i = 0; i <= 20; i++) {
    const t = i / 20;
    points.push(new THREE.Vector3(dir.x * t * length, dir.y * t * length, dir.z * t * length));
  }
  return new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(points),
    new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.85 })
  );
}

function makeFieldLines() {
  while (fieldLinesGroup.children.length) fieldLinesGroup.remove(fieldLinesGroup.children[0]);
  const color = isPositive ? 0x00e5ff : 0xff3355;
  const N = fieldDensity;
  const goldenRatio = (1 + Math.sqrt(5)) / 2;

  for (let i = 0; i < N * N / 4; i++) {
    const theta = Math.acos(1 - 2 * (i + 0.5) / (N * N / 4));
    const phi = 2 * Math.PI * i / goldenRatio;
    const dir = new THREE.Vector3(Math.sin(theta) * Math.cos(phi), Math.cos(theta), Math.sin(theta) * Math.sin(phi)).normalize();
    const lineLength = 4 + Math.random() * 1.5;
    const startDist = 0.22;
    const group = new THREE.Group();
    if (isPositive) {
      group.position.copy(dir.clone().multiplyScalar(startDist));
    } else {
      group.position.copy(dir.clone().multiplyScalar(lineLength));
    }
    const lineDir = isPositive ? dir.clone() : dir.clone().negate();
    group.add(makeSpiralArrow(lineDir, lineLength - startDist, color));
    const cone = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.15, 6), new THREE.MeshBasicMaterial({ color }));
    cone.position.copy(lineDir.clone().multiplyScalar(lineLength - startDist));
    cone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), lineDir);
    group.add(cone);
    fieldLinesGroup.add(group);
  }
}

function rebuild() {
  makeCharge(); makeGaussianSurface(); makeFieldLines(); updateFluxDisplay();
}

rebuild();

let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0.3, phi: Math.PI / 3, r: 7 };

canvas.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
canvas.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('mousemove', e => {
  if (!isDragging) return;
  spherical.theta -= (e.clientX - prevMouse.x) * 0.005;
  spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi + (e.clientY - prevMouse.y) * 0.005));
  prevMouse = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('wheel', e => { spherical.r = Math.max(3, Math.min(15, spherical.r + e.deltaY * 0.01)); });

let lastTouch = null;
canvas.addEventListener('touchstart', e => { lastTouch = e.touches[0]; });
canvas.addEventListener('touchmove', e => {
  if (!lastTouch) return;
  const t = e.touches[0];
  spherical.theta -= (t.clientX - lastTouch.clientX) * 0.005;
  spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi + (t.clientY - lastTouch.clientY) * 0.005));
  lastTouch = t;
});

document.getElementById('charge-slider').addEventListener('input', function() {
  chargeVal = parseFloat(this.value);
  document.getElementById('charge-val').textContent = chargeVal.toFixed(1) + ' μC';
  rebuild();
});
document.getElementById('radius-slider').addEventListener('input', function() {
  surfaceRadius = parseFloat(this.value);
  document.getElementById('radius-val').textContent = surfaceRadius.toFixed(2) + ' m';
  makeGaussianSurface(); updateFluxDisplay();
});
document.getElementById('density-slider').addEventListener('input', function() {
  fieldDensity = parseInt(this.value);
  document.getElementById('density-val').textContent = fieldDensity;
  makeFieldLines();
});
document.getElementById('toggle-surface').addEventListener('click', function() {
  showSurface = !showSurface;
  this.textContent = 'Gaussian Surface: ' + (showSurface ? 'ON' : 'OFF');
  this.classList.toggle('active', showSurface);
  makeGaussianSurface();
});
document.getElementById('toggle-charge').addEventListener('click', function() {
  isPositive = !isPositive;
  this.textContent = 'Switch to ' + (isPositive ? 'Negative' : 'Positive');
  document.getElementById('charge-type-label').textContent = isPositive ? '⊕ Positive Charge' : '⊖ Negative Charge';
  document.getElementById('charge-type-label').style.color = isPositive ? '#00e5ff' : '#ff4466';
  rebuild();
});

let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.008;
  camera.position.x = spherical.r * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = spherical.r * Math.cos(spherical.phi);
  camera.position.z = spherical.r * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(0, 0, 0);
  if (chargeObj) chargeObj.scale.setScalar(1 + 0.08 * Math.sin(t * 3));
  fieldLinesGroup.children.forEach((g, i) => {
    const phase = t * 2 + i * 0.4;
    g.children.forEach(c => { if (c.material) c.material.opacity = 0.4 + 0.45 * Math.abs(Math.sin(phase)); });
  });
  if (gaussSphere) gaussSphere.material.opacity = 0.04 + 0.03 * Math.sin(t * 1.5);
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
